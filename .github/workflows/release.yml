name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # rustup picks up rust-toolchain.toml (1.96.0 + rustfmt + clippy).
      - name: Install toolchain
        run: |
          rustup show active-toolchain
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Package
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            tar -C "target/$target/release" -czf "athenacli-$GITHUB_REF_NAME-$target.tar.gz" athenacli
          done
          shasum -a 256 athenacli-*.tar.gz > checksums.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes athenacli-*.tar.gz checksums.sha256
